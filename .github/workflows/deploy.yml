name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Push to Hugging Face Spaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --silent

      - name: Build React app
        working-directory: frontend
        run: npm run build

      - name: Configure git for HF push
        run: |
          git config user.email "adivid198986@gmail.com"
          git config user.name  "aditya-rAj19"

      - name: Commit built React
        run: |
          git add static/react/ -f
          git diff --cached --quiet || git commit -m "ci: add built React [skip ci]"

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://aditya-rAj19:${HF_TOKEN}@huggingface.co/spaces/aditya-rAj19/FaceSWAP || true
          git push hf main --force
