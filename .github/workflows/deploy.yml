name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  # ── Wait for CI to pass first ─────────────────────────────────────────────
  deploy:
    name: Push to Hugging Face Spaces
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Inject Firebase config from GitHub Secrets ──────────────────────
      - name: Inject Firebase config into firebase.js
        run: |
          cat > frontend/src/firebase.js << ENDOFFILE
          import { initializeApp }  from 'firebase/app';
          import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'firebase/auth';

          const firebaseConfig = {
            apiKey:            "${{ secrets.FIREBASE_API_KEY }}",
            authDomain:        "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId:         "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket:     "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId:             "${{ secrets.FIREBASE_APP_ID }}",
            measurementId:     "${{ secrets.FIREBASE_MEASUREMENT_ID }}",
          };

          const fbApp          = initializeApp(firebaseConfig);
          const auth           = getAuth(fbApp);
          const googleProvider = new GoogleAuthProvider();

          export { auth, googleProvider, signInWithPopup, signOut, onAuthStateChanged };
          ENDOFFILE

      # ── Build React with real Firebase config ────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --silent

      - name: Build React app (with real Firebase config)
        working-directory: frontend
        run: npm run build

      # ── Push to Hugging Face Spaces ──────────────────────────────────────
      - name: Configure git for HF push
        run: |
          git config user.email "adivid198986@gmail.com"
          git config user.name  "ADiTyaRaj8969"

      - name: Add built React to commit
        run: |
          git add static/react/ -f
          git add frontend/src/firebase.js -f
          git diff --cached --quiet || git commit -m "ci: build React with Firebase config [skip ci]"

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://ADiTyaRaj8969:${HF_TOKEN}@huggingface.co/spaces/ADiTyaRaj8969/FaceSwap || true
          git push hf main --force
